<!doctype html>
<html lang="pt-BR" data-theme="default">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logbook</title>
    <script>
      (() => {
        try {
          // Abre SEM versão (read-only): nunca cria/altera schema. Fecha a
          // conexão logo após ler, pra não bloquear o upgrade do idb.ts.
          const req = indexedDB.open("diario-de-bordo");
          req.onsuccess = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains("preferences")) {
              db.close();
              return;
            }
            const tx = db.transaction("preferences", "readonly");
            const getReq = tx.objectStore("preferences").get("theme");
            getReq.onsuccess = () => {
              const theme = getReq.result;
              if (theme) {
                document.documentElement.setAttribute("data-theme", theme);
              }
            };
            tx.oncomplete = () => db.close();
          };
        } catch(err) {
          console.error(err);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
